<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">

  <!-- Big Dipper -->
  <g opacity="0.8">
    <circle cx="80"  cy="180" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="130" cy="160" r="2"   fill="white" opacity="0.8"/>
    <circle cx="185" cy="155" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="230" cy="165" r="2"   fill="white" opacity="0.8"/>
    <circle cx="265" cy="125" r="3"   fill="white" opacity="1"/>
    <circle cx="300" cy="148" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="330" cy="172" r="2"   fill="white" opacity="0.8"/>
  </g>

  <!-- Cassiopeia -->
  <g opacity="0.8">
    <circle cx="900"  cy="60"  r="2.5" fill="white" opacity="0.9"/>
    <circle cx="950"  cy="110" r="2"   fill="white" opacity="0.8"/>
    <circle cx="1000" cy="65"  r="3"   fill="white" opacity="1"/>
    <circle cx="1050" cy="105" r="2"   fill="white" opacity="0.8"/>
    <circle cx="1100" cy="60"  r="2.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Orion -->
  <g opacity="0.8">
    <circle cx="720" cy="490" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="760" cy="495" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="800" cy="490" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="690" cy="390" r="3"   fill="white" opacity="1"/>
    <circle cx="840" cy="385" r="3.5" fill="white" opacity="1"/>
    <circle cx="700" cy="610" r="3"   fill="white" opacity="1"/>
    <circle cx="820" cy="605" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="760" cy="330" r="2"   fill="white" opacity="0.8"/>
  </g>

  <!-- Southern Cross -->
  <g opacity="0.8">
    <circle cx="1350" cy="600" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="1350" cy="720" r="3"   fill="white" opacity="1"/>
    <circle cx="1290" cy="660" r="2"   fill="white" opacity="0.8"/>
    <circle cx="1415" cy="660" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="1350" cy="660" r="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Leo -->
  <g opacity="0.8">
    <circle cx="200" cy="600" r="2"   fill="white" opacity="0.8"/>
    <circle cx="240" cy="560" r="3.5" fill="white" opacity="1"/>
    <circle cx="290" cy="540" r="2"   fill="white" opacity="0.8"/>
    <circle cx="330" cy="560" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="310" cy="620" r="2"   fill="white" opacity="0.8"/>
    <circle cx="420" cy="580" r="3"   fill="white" opacity="1"/>
  </g>
</svg>
